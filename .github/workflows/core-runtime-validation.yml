name: CORE Runtime Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'agent-runtime/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/core-runtime-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-runtime-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-agent-runtime:
    name: Typecheck, build, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck agent runtime
        id: typecheck
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck:agent-runtime 2>&1 | tee typecheck.log

      - name: Upload typecheck diagnostic
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3

      - name: Build agent runtime
        if: steps.typecheck.outcome == 'success'
        run: npm run build:agent-runtime

      - name: Verify CORE command lifecycle
        if: steps.typecheck.outcome == 'success'
        run: npm run smoke:core-command-lifecycle

      - name: Verify CORE context continuity and restart
        if: steps.typecheck.outcome == 'success'
        run: npm run smoke:core-context-continuity

      - name: Verify Nexora work-order execution
        if: steps.typecheck.outcome == 'success'
        id: nexora-work-order-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:nexora-work-order 2>&1 | tee nexora-work-order-smoke.log

      - name: Upload Nexora work-order diagnostic
        if: steps.nexora-work-order-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: nexora-work-order-smoke-log
          path: nexora-work-order-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify Nexora work-order restart recovery
        if: steps.typecheck.outcome == 'success'
        id: nexora-restart-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:nexora-work-order-restart 2>&1 | tee nexora-restart-smoke.log

      - name: Upload Nexora restart diagnostic
        if: steps.nexora-restart-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: nexora-restart-smoke-log
          path: nexora-restart-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify canonical receipt and trust loop
        if: steps.typecheck.outcome == 'success'
        id: canonical-receipt-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:canonical-receipt-trust 2>&1 | tee canonical-receipt-smoke.log

      - name: Upload canonical receipt diagnostic
        if: steps.canonical-receipt-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: canonical-receipt-smoke-log
          path: canonical-receipt-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify canonical receipt restart persistence
        if: steps.typecheck.outcome == 'success'
        id: canonical-receipt-restart-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:canonical-receipt-restart 2>&1 | tee canonical-receipt-restart-smoke.log

      - name: Upload canonical receipt restart diagnostic
        if: steps.canonical-receipt-restart-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: canonical-receipt-restart-smoke-log
          path: canonical-receipt-restart-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify canonical Nexora work-order receipt
        if: steps.typecheck.outcome == 'success'
        id: canonical-work-order-receipt-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:canonical-work-order-receipt 2>&1 | tee canonical-work-order-receipt-smoke.log

      - name: Upload canonical work-order receipt diagnostic
        if: steps.canonical-work-order-receipt-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: canonical-work-order-receipt-smoke-log
          path: canonical-work-order-receipt-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify local Alpha evidence, memory review, and boundary
        if: steps.typecheck.outcome == 'success'
        id: alpha-evidence-local-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:alpha-evidence-local 2>&1 | tee alpha-evidence-local-smoke.log

      - name: Upload local Alpha evidence diagnostic
        if: steps.alpha-evidence-local-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: alpha-evidence-local-smoke-log
          path: alpha-evidence-local-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify fresh-process Alpha evidence continuation
        if: steps.typecheck.outcome == 'success'
        id: alpha-evidence-restart-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:alpha-evidence-restart 2>&1 | tee alpha-evidence-restart-smoke.log

      - name: Upload Alpha evidence restart diagnostic
        if: steps.alpha-evidence-restart-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: alpha-evidence-restart-smoke-log
          path: alpha-evidence-restart-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify truthful Drive Alpha evidence behavior
        if: steps.typecheck.outcome == 'success'
        id: alpha-evidence-drive-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:alpha-evidence-drive 2>&1 | tee alpha-evidence-drive-smoke.log

      - name: Upload Drive Alpha evidence diagnostic
        if: steps.alpha-evidence-drive-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: alpha-evidence-drive-smoke-log
          path: alpha-evidence-drive-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Check live Alpha normal-path setup behavior
        if: steps.typecheck.outcome == 'success'
        id: alpha-evidence-live-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:alpha-evidence-live 2>&1 | tee alpha-evidence-live-smoke.log

      - name: Upload live Alpha evidence diagnostic
        if: steps.alpha-evidence-live-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: alpha-evidence-live-smoke-log
          path: alpha-evidence-live-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify SDK approval interruption and resume
        if: steps.typecheck.outcome == 'success'
        id: sdk-approval-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm --workspace @awakening/agent-runtime run smoke:sdk-approvals 2>&1 | tee sdk-approval-smoke.log

      - name: Upload SDK approval diagnostic
        if: steps.sdk-approval-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: sdk-approval-smoke-log
          path: sdk-approval-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify ordinary delegated file execution
        if: steps.typecheck.outcome == 'success'
        id: delegated-file-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:delegated-file-create 2>&1 | tee delegated-file-smoke.log

      - name: Upload delegated-file diagnostic
        if: steps.delegated-file-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: delegated-file-smoke-log
          path: delegated-file-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify user-requested delegation authority
        if: steps.typecheck.outcome == 'success'
        id: delegated-authority-smoke
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm --workspace @awakening/agent-runtime run smoke:user-requested-delegated-no-approval 2>&1 | tee delegated-authority-smoke.log

      - name: Upload delegated-authority diagnostic
        if: steps.delegated-authority-smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: delegated-authority-smoke-log
          path: delegated-authority-smoke.log
          if-no-files-found: error
          retention-days: 3

      - name: Check normal conversational smoke setup behavior
        if: steps.typecheck.outcome == 'success'
        run: npm run smoke:core-command-normal-path

      - name: Enforce validation results
        if: always() && (steps.typecheck.outcome == 'failure' || steps.nexora-work-order-smoke.outcome == 'failure' || steps.nexora-restart-smoke.outcome == 'failure' || steps.canonical-receipt-smoke.outcome == 'failure' || steps.canonical-receipt-restart-smoke.outcome == 'failure' || steps.canonical-work-order-receipt-smoke.outcome == 'failure' || steps.alpha-evidence-local-smoke.outcome == 'failure' || steps.alpha-evidence-restart-smoke.outcome == 'failure' || steps.alpha-evidence-drive-smoke.outcome == 'failure' || steps.alpha-evidence-live-smoke.outcome == 'failure' || steps.sdk-approval-smoke.outcome == 'failure' || steps.delegated-file-smoke.outcome == 'failure' || steps.delegated-authority-smoke.outcome == 'failure')
        run: exit 1
