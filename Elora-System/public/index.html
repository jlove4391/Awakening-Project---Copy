<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vireon Core</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Urban+Jungle&display=swap" rel="stylesheet">


  <!-- Global Reset + Dynastic Visual Theme Setup -->
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      background-color: #0A0A0A;
      font-family: 'Montserrat', sans-serif;
      color: #F0F0F0;
      overflow-x: hidden;
    }

    a {
      color: #FFD700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      font-family: 'Montserrat', sans-serif;
      background-color: #1A1A1A;
      color: #FFD700;
      border: 1px solid #FFD700;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background-color: #FFD700;
      color: #0A0A0A;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      font-family: 'Montserrat', sans-serif;
      background-color: #111;
      color: #FFF;
      border: 1px solid #444;
      padding: 10px;
      border-radius: 6px;
      width: 100%;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #0A0A0A;
    }

    ::-webkit-scrollbar-thumb {
      background: #FFD700;
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #AD9142;
    }
  </style>
</head>

<body>
  <div id="root"></div>
</body>
</html>
